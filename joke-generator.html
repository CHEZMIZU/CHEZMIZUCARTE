<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        #joke {
            margin: 20px;
            font-size: 24px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: #007BFF;
            color: white;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #favorites {
            margin-top: 20px;
            max-width: 400px;
        }
        .favorite {
            margin: 5px 0;
            padding: 8px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="joke">Welcome! Click the button to generate a joke.</div>
    <button onclick="generateJoke()">Get a Joke</button>
    <div id="favorites"></div>

    <script>
        const favoritesDiv = document.getElementById('favorites');

        function fetchJoke() {
            fetch('https://v2.jokeapi.dev/joke/Any')
                .then(response => response.json())
                .then(data => {
                    let jokeText;
                    if (data.type === 'single') {
                        jokeText = data.joke;
                    } else {
                        jokeText = `${data.setup} - ${data.delivery}`;
                    }
                    document.getElementById('joke').innerText = jokeText;
                })
                .catch(error => console.error('Error fetching joke:', error));
        }

        function generateJoke() {
            fetchJoke();
        }

        function saveFavorite(joke) {
            let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
            favorites.push(joke);
            localStorage.setItem('favorites', JSON.stringify(favorites));
            displayFavorites();
        }

        function displayFavorites() {
            favoritesDiv.innerHTML = '';
            let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
            favorites.forEach(fav => {
                const div = document.createElement('div');
                div.className = 'favorite';
                div.innerText = fav;
                favoritesDiv.appendChild(div);
            });
        }

        // Load favorites on page load
        window.onload = displayFavorites;
    </script>

</body>
</html>
